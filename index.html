<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaVault - Your Ultimate Movie Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">🎬 CinemaVault</div>
        <nav class="nav-links">
            <a href="#" class="active">Home</a>
            <span id="userInfo" class="user-info"></span>
            <a href="#" id="loginBtn" class="btn-login">Login</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to CinemaVault</h1>
        <p>Explore current movies, showtimes, and book your tickets seamlessly.</p>
    </section>

    <main class="container">
        <h2 class="section-title">Now Showing</h2>
        <div id="movieGrid" class="movie-grid">
            <div class="loading">Loading movies from database...</div>
        </div>
    </main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close-btn">&times;</span>
            
            <h2 id="modalTitle">Account Login</h2>
            
            <form id="authForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" id="submitBtn" class="btn-submit">Sign In</button>
            </form>

            <p class="toggle-text">
                <span id="toggleMessage">Don't have an account?</span> 
                <a href="#" id="toggleAuthLink">Register here</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
