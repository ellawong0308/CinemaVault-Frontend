<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinemaVault - Your Ultimate Movie Guide</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <header class="navbar">
        <div class="logo">🎬 CinemaVault</div>
        <nav class="nav-links" style="display: flex; align-items: center; gap: 15px;">
            <a href="#" class="active">Home</a>
            
            <div id="avatarContainer" style="display: none; align-items: center; position: relative; cursor: pointer;" title="Click to upload profile photo">
                <img id="userAvatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ccc'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z'/></svg>" 
                     alt="Avatar" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #e50914; background-color: #333; transition: transform 0.2s;">
                
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
            </div>

            <span id="userInfo" class="user-info"></span>
            <a href="#" id="loginBtn" class="btn-login">Login</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to CinemaVault</h1>
        <p>Explore current movies, showtimes, and book your tickets seamlessly.</p>
    </section>

    <main class="container">
        <h2 class="section-title">Now Showing</h2>
        <div id="movieGrid" class="movie-grid">
            <div class="loading">Loading movies from database...</div>
        </div>
    </main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span id="closeModal" class="close-btn">&times;</span>
            
            <h2 id="modalTitle">Account Login</h2>
            
            <form id="authForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" id="submitBtn" class="btn-submit">Sign In</button>
            </form>

            <div id="googleBtnGroup" style="margin-top: 20px; display: flex; justify-content: center;">
                <div id="googleSignInButton"></div>
            </div>

            <p class="toggle-text">
                <span id="toggleMessage">Don't have an account?</span> 
                <a href="#" id="toggleAuthLink">Register here</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
